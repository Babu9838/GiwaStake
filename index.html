<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiwaStake - Web3 Staking Platform</title>
    <link rel="stylesheet" href="style.css">
    <!-- Ethers.js CDN for Web3 functionality -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>GiwaStake</h1>
            <p>Secure & Decentralized Staking on GIWA Network</p>
            <button id="connectWalletBtn" class="btn">Connect Wallet</button>
        </header>

        <main>
            <div class="card">
                <h2>Stake Tokens</h2>
                <p>Connected Account: <span id="walletAddress">Not Connected</span></p>
                
                <div class="input-group">
                    <label for="stakeAmount">Amount to Stake:</label>
                    <input type="number" id="stakeAmount" placeholder="0.0">
                </div>

                <button id="stakeBtn" class="btn primary" disabled>Stake</button>
                <button id="withdrawBtn" class="btn secondary" disabled>Withdraw</button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
